<svg width="680" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, sans-serif; background: #ffffff;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Orchestrator -->
  <rect x="40" y="28" width="600" height="52" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Orchestrator</text>
  <text x="340" y="65" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Compiles topology · wires endpoints · launches units · stays off hot path</text>

  <!-- Dashed wiring lines from orchestrator -->
  <line x1="127" y1="80" x2="127" y2="148" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="340" y1="80" x2="340" y2="148" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="553" y1="80" x2="553" y2="148" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Device Interface -->
  <rect x="40" y="148" width="175" height="88" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="127" y="172" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Device interface</text>
  <text x="127" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Hardware boundary</text>
  <text x="127" y="209" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Acquisition timestamps</text>
  <text x="127" y="226" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Owns device semantics</text>

  <!-- Backend -->
  <rect x="253" y="148" width="175" height="88" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="172" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Backend</text>
  <text x="340" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Ingest · process · persist</text>
  <text x="340" y="209" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">pythusa DAG internally</text>
  <text x="340" y="226" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Republishes to frontend</text>

  <!-- Frontend -->
  <rect x="466" y="148" width="175" height="88" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="553" y="172" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Frontend</text>
  <text x="553" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Operator UI</text>
  <text x="553" y="209" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Gauges · plots · controls</text>
  <text x="553" y="226" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Sends desired state</text>

  <!-- Telemetry: DevInterface to Backend -->
  <line x1="215" y1="185" x2="251" y2="185" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="233" y="177" text-anchor="middle" font-size="12" fill="#085041">pyarrow</text>

  <!-- Telemetry: Backend to Frontend -->
  <line x1="428" y1="185" x2="464" y2="185" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="446" y="177" text-anchor="middle" font-size="12" fill="#085041">pyarrow</text>

  <!-- Hardware box -->
  <rect x="40" y="322" width="175" height="50" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="127" y="348" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Hardware / devices</text>

  <!-- Hardware to DevInterface -->
  <line x1="127" y1="322" x2="127" y2="238" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="143" y="285" font-size="12" fill="#5F5E5A">raw data</text>

  <!-- Command path: Frontend to DevInterface -->
  <path d="M553 236 L553 294 L127 294 L127 238" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="340" y="286" text-anchor="middle" font-size="12" fill="#993C1D">commands (pyarrow · direct · no backend in the loop)</text>

  <!-- pythusa callout -->
  <rect x="258" y="256" width="165" height="26" rx="6" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="340" y="273" text-anchor="middle" font-size="12" fill="#534AB7">pythusa: hot path inside backend</text>

  <!-- Legend -->
  <rect x="40" y="390" width="600" height="62" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="56" y="408" font-size="12" fill="#5F5E5A">Legend</text>
  <line x1="110" y1="422" x2="138" y2="422" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="146" y="426" font-size="12" fill="#5F5E5A">Telemetry / state (pyarrow)</text>
  <line x1="340" y1="422" x2="368" y2="422" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="376" y="426" font-size="12" fill="#5F5E5A">Commands (pyarrow · direct)</text>
  <line x1="110" y1="442" x2="138" y2="442" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="146" y="446" font-size="12" fill="#5F5E5A">Orchestrator wiring (topology only, off data path)</text>
</svg>
