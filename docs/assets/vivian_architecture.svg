<svg width="960" viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, system-ui, sans-serif; background:#0A0E10;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="context-stroke" stroke-width="1.7" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="920" height="520" rx="16" fill="#0F1518" stroke="#2A3A40" stroke-width="1"/>
  <text x="48" y="56" fill="#E6EEF2" font-size="22" font-weight="700">VIVIIan System Model</text>
  <text x="48" y="80" fill="#8EA0A8" font-size="13">Local pythusa runtime inside orchestrator, explicit Arrow boundaries between units.</text>

  <rect x="56" y="120" width="220" height="118" rx="10" fill="#121B1F" stroke="#375763"/>
  <text x="72" y="150" fill="#E6EEF2" font-size="16" font-weight="600">Device Interface</text>
  <text x="72" y="172" fill="#8EA0A8" font-size="12">Hardware boundary + command semantics</text>
  <text x="72" y="192" fill="#9FE500" font-size="12">Typed telemetry out</text>
  <text x="72" y="210" fill="#F5A623" font-size="12">Safety / validation ownership</text>

  <rect x="322" y="108" width="586" height="280" rx="12" fill="#10181C" stroke="#375763"/>
  <text x="346" y="138" fill="#E6EEF2" font-size="17" font-weight="700">Orchestrator Deployment</text>

  <rect x="346" y="162" width="250" height="95" rx="10" fill="#142127" stroke="#375763"/>
  <text x="364" y="188" fill="#E6EEF2" font-size="14" font-weight="600">Processing Tools</text>
  <text x="364" y="208" fill="#8EA0A8" font-size="12">pythusa stream tasks</text>
  <text x="364" y="226" fill="#9FE500" font-size="12">filters, transforms, derived channels</text>

  <rect x="620" y="162" width="264" height="95" rx="10" fill="#142127" stroke="#375763"/>
  <text x="638" y="188" fill="#E6EEF2" font-size="14" font-weight="600">GUI Tools</text>
  <text x="638" y="208" fill="#8EA0A8" font-size="12">graphs, gauges, controls</text>
  <text x="638" y="226" fill="#F5A623" font-size="12">operator desk + status strips</text>

  <rect x="346" y="274" width="250" height="95" rx="10" fill="#142127" stroke="#375763"/>
  <text x="364" y="300" fill="#E6EEF2" font-size="14" font-weight="600">Storage Tools</text>
  <text x="364" y="320" fill="#8EA0A8" font-size="12">append-only archival</text>
  <text x="364" y="338" fill="#9FE500" font-size="12">replay-ready typed records</text>

  <rect x="620" y="274" width="264" height="95" rx="10" fill="#142127" stroke="#375763"/>
  <text x="638" y="300" fill="#E6EEF2" font-size="14" font-weight="600">Connector Boundary</text>
  <text x="638" y="320" fill="#8EA0A8" font-size="12">Arrow schemas between units</text>
  <text x="638" y="338" fill="#EA4228" font-size="12">explicit contracts, versioned streams</text>

  <line x1="276" y1="176" x2="322" y2="176" stroke="#9FE500" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="282" y="166" fill="#8EA0A8" font-size="11">telemetry/state</text>

  <path d="M 740 257 L 740 430 L 166 430 L 166 238" fill="none" stroke="#F5A623" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="440" y="422" fill="#8EA0A8" font-size="11">typed commands return to device interface</text>

  <rect x="56" y="448" width="852" height="70" rx="10" fill="#0C1215" stroke="#2A3A40"/>
  <text x="76" y="475" fill="#E6EEF2" font-size="13" font-weight="600">Legend</text>
  <text x="76" y="495" fill="#9FE500" font-size="12">OK/healthy channels</text>
  <text x="246" y="495" fill="#F5A623" font-size="12">Warning/attention</text>
  <text x="396" y="495" fill="#EA4228" font-size="12">Critical/error states</text>
  <text x="556" y="495" fill="#8EA0A8" font-size="12">High-contrast labels for operator readability</text>
