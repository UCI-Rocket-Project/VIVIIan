[nidaq]
mode = "real"
device = "Dev1"
channel_sampling_rate = 50000
buffer_duration_sec = 20

[nidaq.fake]
noise_std = 0.0008
base_hz = 2.0
hz_step = 0.6
phase_step = 0.5


[performance]


[database]
server = "localhost"
pg_port = 8812
user = "admin"
password = "quest"
dbname = "qdb"
connect_timeout_seconds = 1.0
autocommit = true

[query_model.default]

[[query_model.default.streams]]
name = "load_cell"
schema = "public"
table = "LOAD_CELL"
timestamp_column = "timestamp"
value_column = "Load Cell"

[[query_model.default.streams]]
name = "PTS"
schema = "public"
table = "LOAD_CELL"
timestamp_column = "timestamp"
value_column = "PTS"

[nidaq_stream]
host = "127.0.0.1"
port = 50100
raw_batch_points = 200
plot_points = 1200
default_window_s = 300.0
fft_top_n = 8

[[nidaq_signals]]
name = "load_cell"
source_column = "Load Cell"
avg_n = 50

[[nidaq_signals]]
name = "pts"
source_column = "PTS"
avg_n = 50

[[graph_cells]]
title = "Cell A"
signals = ["load_cell"]
window_s = 300.0

[[graph_cells]]
title = "Cell B"
signals = ["pts", "load_cell"]
window_s = 300.0
